<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siddharth's Pre-Wedding Tour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --wine: #722f37;
            --wine-dark: #3a1118;
            --bg-dark: #0a0a0a;
            --glass-bg: rgba(20, 10, 12, 0.75);
            --glass-border: rgba(212, 175, 55, 0.25);
            --text-main: #fdfdfd;
            --text-muted: #b3b3b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(114, 47, 55, 0.4), transparent 45%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.2), transparent 45%),
                linear-gradient(rgba(10, 5, 5, 0.75), rgba(5, 5, 10, 0.85)),
                url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient floating light particles for extreme fanciness */
        .ambient-light {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--wine);
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            animation: float 15s infinite alternate ease-in-out;
            z-index: 0;
        }
        .ambient-1 { top: -150px; left: -150px; }
        .ambient-2 { bottom: -150px; right: -150px; background: var(--gold); animation-delay: -7s; opacity: 0.15;}

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 60px) scale(1.1); }
        }

        .form-container {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(212, 175, 55, 0.6); /* Glowing top edge */
            border-radius: 20px;
            max-width: 550px;
            width: 100%;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: formReveal 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes formReveal {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .header-section {
            text-align: center;
            margin-bottom: 45px;
        }

        .header-section h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 2px 15px rgba(212, 175, 55, 0.4);
        }

        .header-section p {
            color: #ececec;
            font-size: 16px;
            line-height: 1.6;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .form-group {
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeInItem 0.6s ease forwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeInItem {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label.main-label {
            display: block;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--gold-light);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.9;
        }

        .required-star {
            color: #e63946;
            margin-left: 4px;
            font-size: 16px;
            font-weight: bold;
        }

        /* Inputs */
        .input-wrapper input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            color: var(--text-main);
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.25);
        }

        /* Fancy Pill Radio Buttons */
        .radio-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .radio-option {
            position: relative;
            flex: 1;
            min-width: calc(50% - 10px);
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .radio-option span {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .radio-option:hover span {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .radio-option input[type="radio"]:checked + span {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
            color: var(--gold-light);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2),
                        inset 0 0 10px rgba(212, 175, 55, 0.1);
            transform: translateY(-2px);
        }

        /* Animated Alcohol Section Using Pure CSS Grid Trick */
        .alcohol-section-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            margin-top: 0;
        }

        /* The magic: when the #sula_yes input is checked anywhere in the document, expand this section */
        body:has(#sula_yes:checked) .alcohol-section-wrapper {
            grid-template-rows: 1fr;
            margin-top: 15px;
        }

        /* Fallback for browsers that don't support :has() */
        .fallback-visible {
            grid-template-rows: 1fr !important;
            margin-top: 15px !important;
        }

        .alcohol-section-inner {
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.4s ease;
            transition-delay: 0s;
            padding: 0 15px;
            border-left: 2px solid var(--gold);
            margin-left: 5px;
        }

        body:has(#sula_yes:checked) .alcohol-section-inner,
        .fallback-visible .alcohol-section-inner {
            opacity: 1;
            transition-delay: 0.2s;
            padding-top: 15px;
            padding-bottom: 5px;
        }

        .submit-btn {
            width: 100%;
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(135deg, var(--gold), #b89125);
            color: #111;
            border: none;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #f3e5ab, var(--gold));
        }

        .submit-btn:active {
            transform: translateY(1px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
            .form-container {
                padding: 40px 25px;
                border-radius: 16px;
            }
            .header-section h2 {
                font-size: 32px;
            }
            .radio-group {
                flex-direction: column;
                gap: 12px;
            }
            .radio-option {
                width: 100%;
            }
            .ambient-light {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-light ambient-1"></div>
    <div class="ambient-light ambient-2"></div>

    <div class="form-container">
        <div class="header-section">
            <h2>Siddharth's Pre-Wedding Tour</h2>
            <p>We are delighted to invite you to Siddharth's pre-wedding Nashik tour. Please share your preferences to perfect the itinerary for Tuesday, 23rd June 2026.</p>
        </div>

        <form action="https://formspree.io/f/xzdwkqba" method="POST">
            
            <div class="form-group">
                <label class="main-label" for="name">Esteemed Guest Name<span class="required-star">*</span></label>
                <div class="input-wrapper">
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label" for="age">Age<span class="required-star">*</span></label>
                <div class="input-wrapper">
                    <input type="number" id="age" name="age" placeholder="e.g., 25" min="1" max="120" required>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">Culinary Preference<span class="required-star">*</span></label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="diet" value="Pure Veg" required>
                        <span>Pure Vegetarian</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="diet" value="Non-Veg">
                        <span>Non-Vegetarian</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">Trimbakeshwar Mandir Tour<span class="required-star">*</span></label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="trimbakeshwar" value="Yes" required>
                        <span>Will Attend</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="trimbakeshwar" value="No">
                        <span>Decline</span>
                    </label>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label class="main-label">Sula Vineyard Experience<span class="required-star">*</span></label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="sula" id="sula_yes" value="Yes" required>
                        <span>Will Attend</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="sula" id="sula_no" value="No">
                        <span>Decline</span>
                    </label>
                </div>
            </div>

            <!-- Pure CSS Animated Alcohol Preference Section (with JS fallback) -->
            <div class="alcohol-section-wrapper" id="alcohol_wrapper">
                <div class="alcohol-section-inner">
                    <label class="main-label" style="font-size: 11px; color: var(--text-muted);">Wine Tasting Preference<span class="required-star">*</span></label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="alcohol" value="Yes">
                            <span style="font-size: 13px; padding: 12px;">Include Wine Tasting</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="alcohol" value="No">
                            <span style="font-size: 13px; padding: 12px;">Mocktails / Juice Only</span>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn" style="margin-top: 30px;">Confirm Attendance</button>
        </form>
    </div>

    <script>
        // JS Fallback for browsers that do not support :has() and validation logic
        const sulaYes = document.getElementById('sula_yes');
        const sulaNo = document.getElementById('sula_no');
        const alcoholWrapper = document.getElementById('alcohol_wrapper');
        const alcoholRadios = document.getElementsByName('alcohol');
        
        function updateAlcoholVisibility() {
            if (sulaYes.checked) {
                alcoholWrapper.classList.add('fallback-visible');
                // Make alcohol preference required when attending Sula
                alcoholRadios.forEach(radio => radio.setAttribute('required', 'required'));
            } else {
                alcoholWrapper.classList.remove('fallback-visible');
                // Clear alcohol selection and remove required attribute when not attending Sula
                alcoholRadios.forEach(radio => {
                    radio.checked = false;
                    radio.removeAttribute('required');
                });
            }
        }

        sulaYes.addEventListener('change', updateAlcoholVisibility);
        sulaNo.addEventListener('change', updateAlcoholVisibility);
        
        // Check on initial load in case of form resubmission/back button
        updateAlcoholVisibility();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nashik Trip RSVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #722f37; /* Wine Red */
            --primary-light: #9b3a4a;
            --primary-dark: #4a1d23;
            --accent: #d4af37; /* Gold */
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --bg-color: #fdfbfb;
            --white: #ffffff;
            --error: #e63946;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative background elements */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            z-index: 0;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }

        body::before {
            background: #f4d0d0;
            top: -100px;
            left: -100px;
        }

        body::after {
            background: #e2c3c3;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        .form-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            max-width: 540px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(114, 47, 55, 0.08), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-section h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header-section p.subtitle {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 300;
            line-height: 1.6;
            max-width: 80%;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        label.main-label {
            display: block;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text-dark);
            font-size: 15px;
        }

        /* Floating Label Inputs */
        .input-wrapper {
            position: relative;
        }

        .input-wrapper input[type="text"],
        .input-wrapper input[type="number"] {
            width: 100%;
            padding: 16px 16px 16px 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(114, 47, 55, 0.15);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            color: var(--text-dark);
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .input-wrapper input::placeholder {
            color: #a0a0a0;
            font-weight: 300;
        }

        .input-wrapper input:focus {
            outline: none;
            background: var(--white);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(114, 47, 55, 0.1);
        }

        /* Custom Radio Buttons */
        .radio-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .radio-option {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(114, 47, 55, 0.15);
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 400;
            flex: 1;
            min-width: calc(50% - 10px);
            justify-content: center;
        }

        .radio-option:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(114, 47, 55, 0.3);
            transform: translateY(-1px);
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-option span {
            position: relative;
            padding-left: 28px;
        }

        /* Custom Radio Circle */
        .radio-option span::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            border: 2px solid #ccc;
            border-radius: 50%;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .radio-option span::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .radio-option input[type="radio"]:checked ~ span::before {
            border-color: var(--primary);
        }

        .radio-option input[type="radio"]:checked ~ span::after {
            transform: translateY(-50%) scale(1);
        }
        
        .radio-option:has(input[type="radio"]:checked) {
            background: var(--white);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(114, 47, 55, 0.08);
        }

        .sub-category {
            margin-top: 15px;
            padding: 20px;
            background: rgba(114, 47, 55, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(114, 47, 55, 0.08);
            display: none;
            animation: expandDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: top;
        }

        @keyframes expandDown {
            from { opacity: 0; transform: scaleY(0.95); }
            to { opacity: 1; transform: scaleY(1); }
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(114, 47, 55, 0.25);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(114, 47, 55, 0.35);
        }

        .submit-btn:hover::before {
            transform: translateX(100%);
        }

        .submit-btn:active {
            transform: translateY(1px);
            box-shadow: 0 4px 12px rgba(114, 47, 55, 0.2);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .form-container {
                padding: 40px 24px;
            }
            .radio-group {
                flex-direction: column;
                gap: 10px;
            }
            .radio-option {
                width: 100%;
            }
        }
    </style>
    <script>
        function toggleAlcoholPreference() {
            const sulaYes = document.getElementById('sula_yes').checked;
            const alcoholSection = document.getElementById('alcohol_section');
            if (sulaYes) {
                alcoholSection.style.display = 'block';
            } else {
                alcoholSection.style.display = 'none';
                // Reset sub-category selections if Sula is No
                document.getElementsByName('alcohol').forEach(radio => radio.checked = false);
            }
        }
    </script>
</head>
<body>

    <div class="form-container">
        <div class="header-section">
            <h2>Nashik Trip RSVP</h2>
            <p class="subtitle">Please fill out your preferences to help us finalize the itinerary for Tuesday, 23rd.</p>
        </div>

        <form action="https://formspree.io/f/xzdwkqba" method="POST">
            
            <div class="form-group">
                <label class="main-label" for="name">Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="name" name="name" placeholder="E.g., Rahul Sharma" required>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label" for="age">Age</label>
                <div class="input-wrapper">
                    <input type="number" id="age" name="age" placeholder="25" min="1" max="120" required>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">Dietary Preference</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="diet" value="Pure Veg" required>
                        <span>Pure Veg</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="diet" value="Non-Veg">
                        <span>Non-Veg</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">Will you join the Trimbakeshwar Mandir Tour?</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="trimbakeshwar" value="Yes" required>
                        <span>Yes</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="trimbakeshwar" value="No">
                        <span>No</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">Will you join the Sula Vineyard Tour?</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="sula" id="sula_yes" value="Yes" onchange="toggleAlcoholPreference()" required>
                        <span>Yes</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="sula" id="sula_no" value="No" onchange="toggleAlcoholPreference()">
                        <span>No</span>
                    </label>
                </div>

                <!-- Sub-category: Only visible if Sula == Yes -->
                <div class="sub-category" id="alcohol_section">
                    <label class="main-label" style="font-size: 14px;">Alcohol Preference (Wine Tasting)</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="alcohol" value="Yes">
                            <span style="font-size: 13px;">Yes, I'll partake</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="alcohol" value="No">
                            <span style="font-size: 13px;">No (Mocktails/Juice)</span>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Preferences</button>
        </form>
    </div>

</body>
</html>

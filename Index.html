<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nashik Trip RSVP</title>
    <style>
        :root {
            --primary: #722f37; /* Wine Red */
            --primary-hover: #5a252b;
            --bg: #fbfaf8;
            --surface: #ffffff;
            --text: #2c3e50;
            --border: #e2e8f0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: var(--surface);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 8px solid var(--primary);
        }

        h2 {
            color: var(--primary);
            text-align: center;
            margin-top: 0;
            font-size: 28px;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label.main-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e293b;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .radio-option input {
            margin-right: 8px;
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
        }

        .sub-category {
            margin-top: 15px;
            margin-left: 10px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 3px solid var(--primary);
            border-radius: 0 8px 8px 0;
            display: none; /* Hidden by default */
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
        }
    </style>
    <script>
        function toggleAlcoholPreference() {
            const sulaYes = document.getElementById('sula_yes').checked;
            const alcoholSection = document.getElementById('alcohol_section');
            if (sulaYes) {
                alcoholSection.style.display = 'block';
            } else {
                alcoholSection.style.display = 'none';
                // Reset sub-category selections if Sula is No
                document.getElementsByName('alcohol').forEach(radio => radio.checked = false);
            }
        }
    </script>
</head>
<body>

    <div class="form-container">
        <h2>Nashik Trip RSVP</h2>
        <p class="subtitle">Please fill out your preferences to help us finalize the itinerary for Tuesday, 23rd.</p>

        <!-- Replace "YOUR_ENDPOINT_HERE" with a service like Formspree or your own backend -->
        <form action="https://formspree.io/f/xzdwkqba" method="POST">
            
            <div class="form-group">
                <label class="main-label" for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="E.g., Rahul Sharma" required>
            </div>

            <div class="form-group">
                <label class="main-label" for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="25" min="1" max="120" required>
            </div>

            <div class="form-group">
                <label class="main-label">Dietary Preference</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="diet" value="Pure Veg" required> Pure Veg
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="diet" value="Non-Veg"> Non-Veg
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">Will you join the Trimbakeshwar Mandir Tour?</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="trimbakeshwar" value="Yes" required> Yes
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="trimbakeshwar" value="No"> No
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">Will you join the Sula Vineyard Tour?</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="sula" id="sula_yes" value="Yes" onchange="toggleAlcoholPreference()" required> Yes
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="sula" id="sula_no" value="No" onchange="toggleAlcoholPreference()"> No
                    </label>
                </div>

                <!-- Sub-category: Only visible if Sula == Yes -->
                <div class="sub-category" id="alcohol_section">
                    <label class="main-label" style="font-size: 14px;">Alcohol Preference (Wine Tasting)</label>
                    <div class="radio-group">
                        <label class="radio-option" style="font-size: 14px;">
                            <input type="radio" name="alcohol" value="Yes"> Yes, I'll partake
                        </label>
                        <label class="radio-option" style="font-size: 14px;">
                            <input type="radio" name="alcohol" value="No"> No (Mocktails/Juice only)
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Preferences</button>
        </form>
    </div>

</body>
</html>
